<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memo Board</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Memo Board</h1>
        <p id="status" class="status" aria-live="polite"></p>
      </header>
      <section class="panel">
        <h2 id="form-title">새 메모</h2>
        <form id="memo-form">
          <input name="title" placeholder="제목" required />
          <textarea name="content" placeholder="내용"></textarea>
          <input name="image_url" placeholder="이미지 URL (선택)" />
          <button type="submit" id="submit-button">저장</button>
          <button type="button" id="cancel-edit" hidden>취소</button>
        </form>
      </section>
      <section class="panel">
        <h2>메모 목록</h2>
        <ul id="memo-list" class="memo-list"></ul>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
